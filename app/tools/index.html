<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bram tools</title>
    <script>
      (function () {
        var cfg = {};
        try {
          var cfgXhr = new XMLHttpRequest();
          cfgXhr.open("GET", "config.json?_=" + Date.now(), false);
          cfgXhr.send();
          if (cfgXhr.status >= 200 && cfgXhr.status < 300 && cfgXhr.responseText) {
            cfg = JSON.parse(cfgXhr.responseText);
          }
        } catch (e) {}
        window.APP_CONFIG = cfg;
        window.appGlobals = cfg.appGlobals || {};
        window.APP_VERSION = "dev-" + Date.now();
      })();
    </script>
    <script>
      // Cachebust helpers.js using APP_VERSION (set above to dev-Date.now()).
      // Without this, browsers cache /__shell/helpers.js indefinitely and
      // edits don't take effect across iframe reloads.
      document.write('<script src="/__shell/helpers.js?v=' + window.APP_VERSION + '"><\/script>');
    </script>
    <script>
      logToHost({ kind: "tools-boot", stage: "before-xmlui-load", at: new Date().toISOString() });
    </script>
    <script>
      // helpers.js (line 23) defines window globals like toShell,
      // markInflight, iframeTrace. The engine snapshots `window` at
      // boot to build its expression-scope identifier table — bare-name
      // calls in markup (onClick="toTurn(...)", enabled="{markInflight(...)}",
      // etc.) resolve through that table. Anything added to `window`
      // AFTER xmlui-standalone runs is invisible to markup. Hence:
      // helpers.js MUST load before xmlui-standalone.
      document.write('<script src="/__vendor/xmlui-standalone.umd.js?v=' + Date.now() + '"><\/script>');
      document.write('<script src="/__vendor/xmlui-echart.js?v=' + Date.now() + '"><\/script>');
    </script>
    <script>
      logToHost({ kind: "tools-boot", stage: "after-xmlui-load", at: new Date().toISOString() });
    </script>
    <style>
      /* XMLUI's vendored CSS sets `user-select: none` on ~92 selectors
         (the standalone bundle's CSS-module defaults), which kills
         text selection inside Markdown, headings, code blocks, list
         items, etc. — including the conversation transcript and the
         worklist item prose. Override on native text-bearing elements
         only; leave the bundle's user-select: none rules in place for
         interactive surfaces (buttons, splitter handles, modal close,
         the dragging cursor — those want to suppress accidental
         selection). */
      p, h1, h2, h3, h4, h5, h6, li, code, pre, blockquote,
      td, th, dt, dd, figcaption,
      [class*="_text_"], [class*="_paragraph_"], [class*="_markdown_"],
      [class*="_heading_"] {
        user-select: text;
        -webkit-user-select: text;
      }
    </style>
  </head>
  <body></body>
</html>
